services:
  - type: web
    name: immoprix
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn --chdir src/webapp app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
